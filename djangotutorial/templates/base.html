<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Poll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #060d06;
            --surface: #0d1a0d;
            --surface2: #112011;
            --border: #1a3a1a;
            --accent: #00e054;
            --accent-dim: #00e05420;
            --accent2: #ff4747;
            --text: #e8f5e8;
            --muted: #4a6a4a;
            --pitch-line: #1a3a1a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image:
                linear-gradient(var(--pitch-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--pitch-line) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #060d06cc;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 20px #00e05460;
        }

        header .badge {
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
        }

        header .dot {
            width: 8px;
            height: 8px;
            background: var(--accent2);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            margin-left: auto;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #ff474760; }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px #ff474700; }
        }

        main {
            flex: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            width: 100%;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            background: #060d06cc;
        }

        footer span { color: var(--accent); }
    </style>
</head>
<body>
    <header>
        <span class="logo">⚽ Match Poll</span>
        <span class="badge">Live</span>
        <span class="dot"></span>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>Match Poll &mdash; <span>Cast your vote</span></footer>
</body>
</html>
