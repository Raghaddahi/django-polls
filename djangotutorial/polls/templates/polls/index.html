{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    .page-label {
        font-size: 0.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.5rem;
    }

    h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 3rem;
        letter-spacing: 2px;
        line-height: 1;
        margin-bottom: 2.5rem;
    }

    h1 span { color: var(--accent); text-shadow: 0 0 30px #00e05460; }

    .poll-list { list-style: none; display: flex; flex-direction: column; gap: 1rem; }

    .poll-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem 1.75rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        color: var(--text);
        transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .poll-card:hover {
        border-color: var(--accent);
        transform: translateX(4px);
        box-shadow: 0 0 20px #00e05420;
    }

    .poll-card .poll-title { font-size: 1.05rem; font-weight: 500; }
    .poll-card .arrow { color: var(--accent); font-size: 1.2rem; }

    .empty {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 12px;
    }

    .empty p { font-size: 1rem; }
</style>

<p class="page-label">Active Polls</p>
<h1>Who Will <span>Win?</span></h1>

{% if latest_question_list %}
<ul class="poll-list">
    {% for question in latest_question_list %}
    <li>
        <a class="poll-card" href="{% url 'polls:detail' question.id %}">
            <span class="poll-title">{{ question.question_text }}</span>
            <span class="arrow">→</span>
        </a>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="empty">
    <p>No polls available right now.</p>
</div>
{% endif %}
{% endblock %}
