{% extends "base.html" %}
{% load static %}

{% block content %}
<style>
    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
        margin-bottom: 2rem;
        transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .match-label {
        font-size: 0.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 0.5rem;
    }

    h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.5rem;
        letter-spacing: 1px;
        margin-bottom: 2rem;
        line-height: 1.1;
    }

    .error {
        background: #ff474720;
        border: 1px solid var(--accent2);
        color: var(--accent2);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }

    .choices { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }

    .choice-label {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.1rem 1.25rem;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        font-size: 1rem;
        font-weight: 500;
    }

    .choice-label:hover { border-color: var(--accent); background: #ffffff08; }

    input[type="radio"] { display: none; }

    input[type="radio"]:checked + .choice-label {
        border-color: var(--accent);
        background: #00e05415;
        color: var(--accent);
        box-shadow: 0 0 15px #00e05420;
    }

    .choice-icon {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--muted);
        flex-shrink: 0;
        transition: border-color 0.2s, background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    input[type="radio"]:checked + .choice-label .choice-icon {
        border-color: var(--accent);
        background: var(--accent);
        box-shadow: 0 0 10px #00e05460;
    }

    .vote-btn {
        background: var(--accent);
        color: #060d06;
        border: none;
        padding: 0.9rem 2.5rem;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.2rem;
        letter-spacing: 2px;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
        width: 100%;
        box-shadow: 0 0 20px #00e05440;
    }

    .vote-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 30px #00e05460; }
    .vote-btn:active { transform: translateY(0); }
</style>

<a class="back-link" href="{% url 'polls:index' %}">← Back to polls</a>

<p class="match-label">Cast Your Vote</p>
<h1>{{ question.question_text }}</h1>

{% if error_message %}
<div class="error">{{ error_message }}</div>
{% endif %}

<form action="{% url 'polls:vote' question.id %}" method="post">
    {% csrf_token %}
    <div class="choices">
        {% for choice in question.choice_set.all %}
        <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
        <label class="choice-label" for="choice{{ forloop.counter }}">
            <span class="choice-icon"></span>
            {{ choice.choice_text }}
        </label>
        {% endfor %}
    </div>
    <button type="submit" class="vote-btn">Vote Now</button>
</form>
{% endblock %}
